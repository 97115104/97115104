name: Profile sync

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: profile-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[profile-sync]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Configure profile-sync merge driver
        run: |
          git config merge.profile-sync.name 'Regenerate profile artifacts'
          git config merge.profile-sync.driver 'sh scripts/git-merge-profile.sh %O %A %B'

      - name: Rebase onto latest main
        run: git pull --rebase origin main

      - name: Sync profile artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_SYNC_TOKEN: ${{ secrets.PROFILE_SYNC_TOKEN }}
        run: node scripts/sync-profile.mjs

      - name: Commit generated artifacts
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[profile-sync] update generated profile artifacts'
          file_pattern: 'generated/* attestations/* llms.txt README.md'
