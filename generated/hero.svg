      .tag { animation: tagline 0.8s ease 1s forwards; opacity: 0; }
    </style>
  </defs>
  <rect width="920" height="120" fill="#0d1117" rx="12"/>
  <text x="460" y="62" text-anchor="middle" fill="#3fb950" font-family="ui-monospace,monospace" font-size="42" font-weight="700" class="nums">97 115 104</text>
  <text x="460" y="98" text-anchor="middle" fill="#8b949e" font-family="ui-monospace,monospace" font-size="16" class="tag">code is cool</text>
